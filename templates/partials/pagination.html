{% if is_paginated %}
<div class="pagination-wrap">
    {% if page_obj.has_previous %}
    <a class="page-link-pill" href="?page={{ page_obj.previous_page_number }}">← Previous</a>
    {% endif %}
    <span style="font-size:13px; color: var(--text3);">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a class="page-link-pill" href="?page={{ page_obj.next_page_number }}">Next →</a>
    {% endif %}
</div>
{% endif %}
