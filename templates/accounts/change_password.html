{% extends "base.html" %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="form-card">
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            {% include "partials/form_field.html" with field=field %}
        {% endfor %}
        <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
</div>
{% endblock %}
