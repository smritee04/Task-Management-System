{% extends "base.html" %}
{% block page_title %}New Performance Evaluation{% endblock %}
{% block content %}
<div class="form-card">
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            {% include "partials/form_field.html" with field=field %}
        {% endfor %}
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary">Save Evaluation</button>
            <a href="{% url 'feedback:evaluation_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
